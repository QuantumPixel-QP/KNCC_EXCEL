version: '3.8'

services:
  backend:
    build:
      context: ./platform/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kncc_user:kncc_pass@db:5432/kncc
      - JWT_SECRET_KEY=b3367b6f84cc5a3f214db254b1509995c739199d7992a54388e225494d4d3d8a
    depends_on:
      - db
    volumes:
      - ./platform/backend:/app
      # Map uploaded files
      - upload_data:/app/uploaded_files

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./platform/frontend:/app
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=kncc_user
      - POSTGRES_PASSWORD=kncc_pass
      - POSTGRES_DB=kncc
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  upload_data:
